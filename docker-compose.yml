services:
  esp-idf:
    image: espressif/idf:v5.5.3
    container_name: esp32-idf-dev
    working_dir: /workspace
    tty: true
    stdin_open: true

    volumes:
      - /dev:/dev
      - ./das_node_cm01/:/workspace
      - esp-idf-home:/root/.espressif
      - vscode-extensions:/root/.vscode-server

    device_cgroup_rules:
      - 'c 188:* rmw'
      - 'c 166:* rmw'
      - 'c 189:* rmw'
    group_add:
      - "20"

    environment:
      IDF_PATH: /opt/esp/idf
      TERM: xterm-256color

    # 使用宿主网络，monitor/flash 更稳定，也方便你做一些网络调试
    network_mode: host

volumes:
  esp-idf-home:
  vscode-extensions:
